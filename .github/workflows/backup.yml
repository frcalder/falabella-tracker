name: Backup DB

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 09:00 Chile
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          DB: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DB" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Secrets not configured — skipping. See README for setup instructions."
          fi

  backup:
    needs: check
    if: needs.check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/backup_db.py

      - name: Rotate (keep last 7 backups)
        run: |
          cd backups
          ls -t backup_*.json | tail -n +8 | xargs -r rm -v

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push
