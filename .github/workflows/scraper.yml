name: Scraper Falabella

on:
  schedule:
    - cron: '0 11 * * *'  # 8 AM Chile time (UTC-3)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          DB: ${{ secrets.DATABASE_URL }}
          USER: ${{ secrets.FALABELLA_USER }}
          PASS: ${{ secrets.FALABELLA_PASSWORD }}
        run: |
          if [ -n "$DB" ] && [ -n "$USER" ] && [ -n "$PASS" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Secrets not configured — skipping. See README for setup instructions."
          fi

  scrape:
    needs: check
    if: needs.check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          FALABELLA_USER: ${{ secrets.FALABELLA_USER }}
          FALABELLA_PASSWORD: ${{ secrets.FALABELLA_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py --mode scraper --headless
